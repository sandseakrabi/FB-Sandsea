<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>SandSea Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Trirong:wght@400;600;700&family=Noto+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --sand-light:#FAF6EF;
    --sand:#F3ECE0;
    --sea-deep:#0E3B38;
    --sea-mid:#155C53;
    --gold:#C9A05C;
    --gold-soft:#E3CFA2;
    --ink:#1B2E2C;
    --coral:#D98870;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:"Noto Sans Thai",sans-serif;
    background:var(--sand-light);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  .display{font-family:"Trirong",serif;}
  button{font-family:inherit;cursor:pointer;border:none;}
  input,select{font-family:inherit;}

  /* ===================== LOGIN SCREEN ===================== */
  #login-screen{
    min-height:100svh;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(180deg,var(--sand-light),var(--sand));
    padding:24px;
  }
  .login-card{
    width:100%;max-width:340px;background:#fff;border-radius:20px;
    padding:32px 26px;box-shadow:0 18px 40px rgba(14,59,56,.12);
    text-align:center;
  }
  .login-card .display{font-size:24px;font-weight:700;color:var(--sea-deep);}
  .login-card .sub{font-size:13px;color:var(--sea-mid);margin-top:6px;margin-bottom:22px;}
  .login-card input{
    width:100%;padding:13px 16px;border-radius:12px;border:1px solid var(--sand);
    background:var(--sand-light);font-size:15px;margin-bottom:12px;text-align:center;
  }
  .login-card input:focus{outline:2px solid var(--gold);}
  .gold-btn{
    width:100%;padding:13px;border-radius:12px;background:var(--sea-deep);
    color:var(--gold-soft);font-size:15px;font-weight:600;
  }
  .login-hint{font-size:11px;color:#9aa9a6;margin-top:14px;line-height:1.5;}

  /* ===================== ADMIN SCREEN ===================== */
  #admin-screen{display:none;min-height:100svh;padding-bottom:60px;}
  .admin-header{
    background:var(--sea-deep);color:var(--sand-light);
    padding:18px 18px;display:flex;align-items:center;justify-content:space-between;
    position:sticky;top:0;z-index:20;
  }
  .admin-header .display{font-size:18px;font-weight:600;}
  .admin-header .sub{font-size:11px;color:var(--gold-soft);}
  .logout-btn{
    font-size:12px;color:var(--gold-soft);border:1px solid rgba(201,160,92,.5);
    padding:7px 14px;border-radius:999px;background:transparent;
  }

  .demo-banner{background:var(--coral);color:#fff;font-size:12px;text-align:center;padding:8px 12px;}
  #status-msg{
    position:fixed;top:14px;left:50%;transform:translateX(-50%);
    background:var(--sea-deep);color:#fff;padding:10px 20px;border-radius:999px;
    font-size:13px;z-index:50;display:none;box-shadow:0 8px 20px rgba(0,0,0,.18);
  }
  #status-msg.error{background:var(--coral);}

  .section{padding:20px 18px 6px;max-width:640px;margin:0 auto;}
  .section-title{font-size:13px;letter-spacing:.06em;color:var(--sea-mid);text-transform:uppercase;margin-bottom:10px;}

  .card{background:#fff;border-radius:18px;padding:20px;box-shadow:0 10px 26px rgba(14,59,56,.07);}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12.5px;color:var(--sea-mid);margin-bottom:6px;}
  .field input[type=text],
  .field input[type=number],
  .field select{
    width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--sand);
    background:var(--sand-light);font-size:14.5px;
  }
  .field input:focus,.field select:focus{outline:2px solid var(--gold);}
  .field input[type=file]{font-size:13px;}
  #image-preview{
    margin-top:10px;width:100%;max-width:160px;height:120px;object-fit:cover;
    border-radius:12px;display:none;border:1px solid var(--sand);
  }
  .form-actions{display:flex;gap:10px;margin-top:6px;}
  .btn-primary{flex:1;padding:13px;border-radius:12px;background:var(--gold);color:var(--ink);font-weight:600;font-size:14.5px;}
  .btn-ghost{padding:13px 16px;border-radius:12px;background:var(--sand);color:var(--sea-deep);font-size:13.5px;}

  .filter-row{display:flex;gap:8px;margin:14px 0;}
  .filter-chip{padding:8px 16px;border-radius:999px;font-size:12.5px;border:1px solid var(--sea-mid);color:var(--sea-deep);background:#fff;}
  .filter-chip.active{background:var(--sea-deep);color:var(--gold-soft);border-color:var(--sea-deep);}

  .menu-row{
    display:flex;gap:12px;background:#fff;border-radius:14px;padding:12px;margin-bottom:10px;
    box-shadow:0 4px 14px rgba(14,59,56,.05);align-items:center;
  }
  .menu-row img{width:58px;height:58px;border-radius:10px;object-fit:cover;background:var(--sand);flex:none;}
  .menu-row .info{flex:1;min-width:0;}
  .menu-row .name{font-family:"Trirong",serif;font-size:14.5px;font-weight:600;}
  .menu-row .meta{font-size:11.5px;color:var(--sea-mid);margin-top:2px;}
  .menu-row .price{font-size:12.5px;color:var(--gold);font-weight:600;margin-top:3px;}
  .row-actions{display:flex;flex-direction:column;gap:6px;flex:none;}
  .row-actions button{font-size:11.5px;padding:6px 10px;border-radius:8px;}
  .edit-btn{background:var(--sand);color:var(--sea-deep);}
  .delete-btn{background:#fbe9e6;color:#b0503f;}

  .empty-note{text-align:center;color:#9aa9a6;font-size:13px;padding:24px 0;}
</style>
</head>
<body>

<!-- ===================== หน้าใส่รหัสผ่าน ===================== -->
<div id="login-screen">
  <div class="login-card">
    <div class="display">SandSea Admin</div>
    <div class="sub">สำหรับพนักงานจัดการเมนู</div>
    <input type="password" id="password-input" placeholder="รหัสผ่าน" onkeydown="if(event.key==='Enter')login()">
    <button class="gold-btn" onclick="login()">เข้าสู่ระบบ</button>
    <div class="login-hint">ใช้รหัสผ่านเดียวกับที่ตั้งไว้ในไฟล์ Code.gs<br>(ตัวแปร ADMIN_PASSWORD)</div>
  </div>
</div>

<!-- ===================== หน้าจัดการเมนู ===================== -->
<div id="admin-screen">
  <div class="admin-header">
    <div>
      <div class="display">SandSea Admin</div>
      <div class="sub">จัดการเมนูอาหาร</div>
    </div>
    <button class="logout-btn" onclick="logout()">ออกจากระบบ</button>
  </div>

  <div id="demo-banner" class="demo-banner" style="display:none;">
    โหมดทดสอบ • ยังไม่ได้เชื่อมต่อ Apps Script จึงบันทึกข้อมูลจริงไม่ได้
  </div>

  <div id="status-msg"></div>

  <div class="section">
    <div class="section-title" id="form-title">เพิ่มเมนูใหม่</div>
    <div class="card">
      <form id="item-form" onsubmit="submitForm(event)">
        <input type="hidden" id="f-id">
        <div class="field">
          <label>ชื่อเมนู</label>
          <input type="text" id="f-name" required placeholder="เช่น ข้าวผัดปูทะเล">
        </div>
        <div class="field">
          <label>ราคา (บาท)</label>
          <input type="number" id="f-price" required min="0" placeholder="เช่น 280">
        </div>
        <div class="field">
          <label>หมวดหมู่ (พิมพ์ใหม่ได้ หรือเลือกจากที่มีอยู่)</label>
          <input type="text" id="f-category" list="category-options" required placeholder="เช่น จานหลัก">
          <datalist id="category-options"></datalist>
        </div>
        <div class="field">
          <label>ช่วงเวลาขาย</label>
          <select id="f-mealtime" required>
            <option value="กลางวัน">กลางวัน (Lunch)</option>
            <option value="กลางคืน">กลางคืน (Dinner)</option>
          </select>
        </div>
        <div class="field">
          <label>รูปเมนู</label>
          <input type="file" accept="image/*" id="f-image" onchange="handleImageChange(event)">
          <img id="image-preview">
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-primary" id="save-btn">เพิ่มเมนู</button>
          <button type="button" class="btn-ghost" id="cancel-btn" style="display:none" onclick="cancelEdit()">ยกเลิก</button>
        </div>
      </form>
    </div>
  </div>

  <div class="section">
    <div class="section-title">รายการเมนูทั้งหมด</div>
    <div class="filter-row">
      <button class="filter-chip active" data-f="all" onclick="setFilter('all')">ทั้งหมด</button>
      <button class="filter-chip" data-f="กลางวัน" onclick="setFilter('กลางวัน')">กลางวัน</button>
      <button class="filter-chip" data-f="กลางคืน" onclick="setFilter('กลางคืน')">กลางคืน</button>
    </div>
    <div id="menu-list"></div>
  </div>
</div>

<script>
/* =====================================================================
   CONFIG : ใช้ลิงก์ /exec เดียวกับที่ใส่ในไฟล์ index.html
===================================================================== */
const API_URL = "https://script.google.com/macros/s/AKfycbwpYNXsgDvLX8RRETFfZOC0f7CyBL1wXAy1igbPWQZaxq9YsMtlvXG1Pm9kKUdBMS5Vsg/exec";

const DEMO_DATA = [
  {ID:"1", Name:"ข้าวผัดปูทะเล", Price:280, ImageURL:"https://placehold.co/200x200/0E3B38/F3ECE0?text=Crab+Rice", Category:"จานหลัก", MealTime:"กลางวัน"},
  {ID:"2", Name:"ผัดไทยกุ้งสด", Price:220, ImageURL:"https://placehold.co/200x200/155C53/F3ECE0?text=Pad+Thai", Category:"จานหลัก", MealTime:"กลางวัน"},
];

const usingDemo = !API_URL || API_URL.startsWith("วาง URL");
let adminPassword = "";
let MENU_DATA = [];
let editingId = null;
let currentFilter = "all";
let pendingImage = null; // {base64, mimeType, fileName}

function login() {
  const val = document.getElementById("password-input").value.trim();
  if (!val) return;
  adminPassword = val;
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("admin-screen").style.display = "block";
  if (usingDemo) document.getElementById("demo-banner").style.display = "block";
  loadMenu();
}

function logout() {
  adminPassword = "";
  document.getElementById("admin-screen").style.display = "none";
  document.getElementById("login-screen").style.display = "flex";
  document.getElementById("password-input").value = "";
}

function showStatus(msg, isError) {
  const box = document.getElementById("status-msg");
  box.textContent = msg;
  box.className = isError ? "error" : "";
  box.style.display = "block";
  setTimeout(() => box.style.display = "none", 3200);
}

async function loadMenu() {
  if (usingDemo) {
    MENU_DATA = JSON.parse(JSON.stringify(DEMO_DATA));
    renderCategoryOptions();
    renderList();
    return;
  }
  try {
    const res = await fetch(API_URL);
    MENU_DATA = await res.json();
  } catch (err) {
    MENU_DATA = [];
    showStatus("โหลดข้อมูลไม่สำเร็จ ลองรีเฟรชหน้านี้อีกครั้ง", true);
  }
  renderCategoryOptions();
  renderList();
}

function renderCategoryOptions() {
  const cats = [...new Set(MENU_DATA.map(i => String(i.Category).trim()).filter(Boolean))];
  document.getElementById("category-options").innerHTML =
    cats.map(c => `<option value="${c}">`).join("");
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll(".filter-chip").forEach(c => c.classList.toggle("active", c.dataset.f === f));
  renderList();
}

function renderList() {
  const list = document.getElementById("menu-list");
  const items = MENU_DATA.filter(i => currentFilter === "all" || String(i.MealTime).trim() === currentFilter);

  if (items.length === 0) {
    list.innerHTML = `<div class="empty-note">ยังไม่มีเมนูในหมวดนี้</div>`;
    return;
  }

  list.innerHTML = items.map(item => `
    <div class="menu-row">
      <img src="${item.ImageURL || ''}" onerror="this.style.opacity=0">
      <div class="info">
        <div class="name">${item.Name}</div>
        <div class="meta">${item.Category} • ${item.MealTime}</div>
        <div class="price">${Number(item.Price).toLocaleString('th-TH')} ฿</div>
      </div>
      <div class="row-actions">
        <button class="edit-btn" onclick='startEdit(${JSON.stringify(item.ID)})'>แก้ไข</button>
        <button class="delete-btn" onclick='deleteItem(${JSON.stringify(item.ID)})'>ลบ</button>
      </div>
    </div>
  `).join("");
}

function startEdit(id) {
  const item = MENU_DATA.find(i => String(i.ID) === String(id));
  if (!item) return;
  editingId = item.ID;
  document.getElementById("f-id").value = item.ID;
  document.getElementById("f-name").value = item.Name;
  document.getElementById("f-price").value = item.Price;
  document.getElementById("f-category").value = item.Category;
  document.getElementById("f-mealtime").value = item.MealTime;
  const preview = document.getElementById("image-preview");
  if (item.ImageURL) { preview.src = item.ImageURL; preview.style.display = "block"; }
  pendingImage = null;
  document.getElementById("form-title").textContent = "แก้ไขเมนู: " + item.Name;
  document.getElementById("save-btn").textContent = "บันทึกการแก้ไข";
  document.getElementById("cancel-btn").style.display = "inline-block";
  window.scrollTo({top:0, behavior:"smooth"});
}

function cancelEdit() {
  editingId = null;
  pendingImage = null;
  document.getElementById("item-form").reset();
  document.getElementById("image-preview").style.display = "none";
  document.getElementById("form-title").textContent = "เพิ่มเมนูใหม่";
  document.getElementById("save-btn").textContent = "เพิ่มเมนู";
  document.getElementById("cancel-btn").style.display = "none";
}

/* ===================================================================
   ย่อรูปก่อนอัปโหลดเสมอ
   เหตุผล: รูปจากกล้องมือถือมักมีขนาดไฟล์ใหญ่มาก (5-10MB) ถ้าส่งตรงๆ
   จะอัปโหลดช้าและอาจเกินขนาดที่ Apps Script รับไหว จึงย่อให้เหลือ
   กว้างไม่เกิน 1280px และบีบคุณภาพลงเล็กน้อยก่อนเสมอ
=================================================================== */
function resizeImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const maxDim = 1280;
        let w = img.width, h = img.height;
        if (w > maxDim || h > maxDim) {
          if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
          else { w = Math.round(w * maxDim / h); h = maxDim; }
        }
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL("image/jpeg", 0.82);
        resolve({
          base64: dataUrl.split(",")[1],
          mimeType: "image/jpeg",
          fileName: "menu_" + Date.now() + ".jpg"
        });
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function handleImageChange(event) {
  const file = event.target.files[0];
  if (!file) return;
  pendingImage = await resizeImage(file);
  const preview = document.getElementById("image-preview");
  preview.src = "data:" + pendingImage.mimeType + ";base64," + pendingImage.base64;
  preview.style.display = "block";
}

async function submitForm(e) {
  e.preventDefault();

  const name = document.getElementById("f-name").value.trim();
  const price = document.getElementById("f-price").value;
  const category = document.getElementById("f-category").value.trim();
  const mealTime = document.getElementById("f-mealtime").value;

  if (!editingId && !pendingImage) {
    showStatus("กรุณาเลือกรูปเมนูก่อนบันทึก", true);
    return;
  }

  if (usingDemo) {
    showStatus("นี่คือโหมดทดสอบ เชื่อมต่อ Apps Script ก่อนถึงจะบันทึกข้อมูลจริงได้", true);
    return;
  }

  const body = {
    password: adminPassword,
    action: editingId ? "edit" : "add",
    id: editingId,
    name, price, category, mealTime
  };
  if (pendingImage) {
    body.imageBase64 = pendingImage.base64;
    body.imageMimeType = pendingImage.mimeType;
    body.imageName = pendingImage.fileName;
  }

  document.getElementById("save-btn").textContent = "กำลังบันทึก...";
  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" }, // กัน CORS preflight
      body: JSON.stringify(body)
    });
    const result = await res.json();
    if (!result.success) {
      showStatus(result.error || "บันทึกไม่สำเร็จ", true);
    } else {
      showStatus(editingId ? "แก้ไขเมนูเรียบร้อย" : "เพิ่มเมนูเรียบร้อย");
      cancelEdit();
      await loadMenu();
    }
  } catch (err) {
    showStatus("เชื่อมต่อไม่สำเร็จ ลองใหม่อีกครั้ง", true);
  }
  document.getElementById("save-btn").textContent = editingId ? "บันทึกการแก้ไข" : "เพิ่มเมนู";
}

async function deleteItem(id) {
  const item = MENU_DATA.find(i => String(i.ID) === String(id));
  if (!item) return;
  if (!confirm("ลบเมนู \"" + item.Name + "\" ใช่ไหม")) return;

  if (usingDemo) {
    showStatus("นี่คือโหมดทดสอบ เชื่อมต่อ Apps Script ก่อนถึงจะลบข้อมูลจริงได้", true);
    return;
  }

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ password: adminPassword, action: "delete", id })
    });
    const result = await res.json();
    if (!result.success) {
      showStatus(result.error || "ลบไม่สำเร็จ", true);
    } else {
      showStatus("ลบเมนูเรียบร้อย");
      await loadMenu();
    }
  } catch (err) {
    showStatus("เชื่อมต่อไม่สำเร็จ ลองใหม่อีกครั้ง", true);
  }
}
</script>
</body>
</html>
