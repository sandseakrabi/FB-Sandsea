<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>SandSea Restaurant — เมนูอาหาร</title>
<meta name="description" content="เมนูอาหาร SandSea Restaurant, Railay Beach">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<meta name="theme-color" content="#15304F">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Thai:wght@500;600;700&family=Prompt:wght@300;400;500;600;700&family=Noto+Sans+Thai:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- ============ CUSTOMER: HOME ============ -->
  <header class="sunset-band">
    <button class="lang-toggle" id="btn-lang-toggle" type="button">EN</button>
    <div class="brand-mark">
      <h1>SandSea Restaurant</h1>
      <div class="sub" id="header-sub">Railay Beach · เมนูอาหาร</div>
    </div>
    <div class="wave-divider">
      <svg viewBox="0 0 600 48" preserveAspectRatio="none">
        <path d="M0,24 C100,44 200,4 300,24 C400,44 500,4 600,24 L600,48 L0,48 Z" fill="#FBF1DC" opacity="0.55"/>
        <path d="M0,32 C100,12 200,52 300,32 C400,12 500,52 600,32 L600,48 L0,48 Z" fill="#FBF1DC"/>
      </svg>
    </div>
  </header>

  <main id="screen-home" class="screen">
    <div class="choice-grid">
      <button class="choice-card lunch" data-period="lunch">
        <div class="icon">☀️</div>
        <div class="label" data-i18n="lunch">มื้อกลางวัน</div>
        <div class="time" data-i18n="lunchSub">Lunch Menu</div>
      </button>
      <button class="choice-card dinner" data-period="dinner">
        <div class="icon">🌙</div>
        <div class="label" data-i18n="dinner">มื้อกลางคืน</div>
        <div class="time" data-i18n="dinnerSub">Dinner Menu</div>
      </button>
    </div>
    <div class="staff-link"><button id="btn-staff-login" data-i18n="staffLogin">เข้าสู่ระบบพนักงาน</button></div>
  </main>

  <!-- ============ CUSTOMER: CATEGORY + MENU ============ -->
  <main id="screen-menu" class="screen hidden">
    <div class="topbar" style="padding-left:0;padding-right:0;">
      <button class="back-btn" id="btn-back-home">‹</button>
      <span class="crumb" id="menu-crumb">มื้อกลางวัน</span>
    </div>
    <div class="chip-row" id="category-chips"></div>
    <div class="menu-grid" id="menu-grid"></div>
  </main>

  <!-- ============ LIGHTBOX ============ -->
  <div class="lightbox" id="lightbox">
    <button class="close-btn" id="lightbox-close">✕</button>
    <img id="lightbox-img" src="" alt="">
    <div class="hint" data-i18n="zoomHint">ลากนิ้วเพื่อซูม / แตะนอกรูปเพื่อปิด</div>
  </div>

  <!-- ============ ADMIN: LOGIN ============ -->
  <main id="screen-login" class="screen hidden">
    <div class="login-box">
      <h2>เข้าสู่ระบบพนักงาน</h2>
      <p>สำหรับเจ้าหน้าที่ร้าน SandSea Restaurant เท่านั้น</p>
      <div class="field">
        <label>รหัสผ่าน</label>
        <input type="password" id="admin-password" placeholder="••••••••">
      </div>
      <button class="btn block" id="btn-do-login">เข้าสู่ระบบ</button>
      <div style="margin-top:14px;">
        <button class="btn ghost" id="btn-cancel-login">กลับหน้าลูกค้า</button>
      </div>
    </div>
  </main>

  <!-- ============ ADMIN: PANEL ============ -->
  <div id="screen-admin" class="hidden">
    <div class="admin-header">
      <h2>จัดการเมนู — SandSea</h2>
      <button class="btn secondary" id="btn-logout">ออกจากระบบ</button>
    </div>
    <div class="admin-tabs">
      <button class="tab-btn active" data-tab="list">รายการเมนู</button>
      <button class="tab-btn" data-tab="form">เพิ่ม/แก้ไขเมนู</button>
      <button class="tab-btn" data-tab="categories">หมวดหมู่</button>
    </div>
    <div class="admin-body">

      <!-- LIST TAB -->
      <div id="tab-list" class="tab-pane">
        <div class="chip-row" id="admin-period-filter">
          <button class="chip active" data-period="all">ทั้งหมด</button>
          <button class="chip" data-period="lunch">กลางวัน</button>
          <button class="chip" data-period="dinner">กลางคืน</button>
        </div>
        <div class="card" id="admin-list-card">
          <div id="admin-list"></div>
        </div>
      </div>

      <!-- FORM TAB -->
      <div id="tab-form" class="tab-pane hidden">
        <div class="card">
          <h3 id="form-title" style="font-family:var(--font-display);color:var(--sea-navy);margin-bottom:14px;">เพิ่มเมนูใหม่</h3>
          <input type="hidden" id="item-id">

          <div class="image-preview" id="image-preview">
            <img id="image-preview-img" src="" alt="" style="display:none;">
          </div>
          <div class="image-drop" id="image-drop">
            📷 แตะเพื่อเลือกรูปภาพ (จะถูกบีบอัดและครอปอัตโนมัติ)
            <input type="file" id="image-input" accept="image/*" class="hidden">
          </div>

          <div class="form-grid" style="margin-top:14px;">
            <div class="field">
              <label>ชื่อเมนู (ไทย) *</label>
              <input type="text" id="item-name" placeholder="เช่น ผัดไทยกุ้งสด">
            </div>
            <div class="field">
              <label>Dish name (English) — optional</label>
              <input type="text" id="item-name-en" placeholder="e.g. Pad Thai with Prawns">
            </div>
            <div class="field">
              <label>ราคา (บาท) *</label>
              <input type="number" id="item-price" placeholder="180" inputmode="decimal">
            </div>
            <div class="field">
              <label>หมวดหมู่ *</label>
              <select id="item-category">
                <option value="">— เลือกหมวดหมู่ —</option>
              </select>
            </div>
            <div class="field">
              <label>ช่วงเวลาขาย *</label>
              <select id="item-period">
                <option value="lunch">กลางวัน</option>
                <option value="dinner">กลางคืน</option>
                <option value="both">ทั้งสองช่วง</option>
              </select>
            </div>
          </div>
          <div class="field">
            <label>รายละเอียดเมนู (ไทย)</label>
            <textarea id="item-desc" placeholder="ส่วนผสม / จุดเด่นของเมนู"></textarea>
          </div>
          <div class="field">
            <label>Description (English) — optional</label>
            <textarea id="item-desc-en" placeholder="Ingredients / highlights"></textarea>
          </div>

          <div style="display:flex; gap:10px; margin-top:6px;">
            <button class="btn block" id="btn-save-item">บันทึกเมนู</button>
            <button class="btn secondary" id="btn-reset-form">ล้างฟอร์ม</button>
          </div>
        </div>
      </div>

      <!-- CATEGORIES TAB -->
      <div id="tab-categories" class="tab-pane hidden">
        <div class="card">
          <h3 style="font-family:var(--font-display);color:var(--sea-navy);margin-bottom:10px;">หมวดหมู่เมนู</h3>
          <div class="category-tag-list" id="category-tag-list"></div>
          <div class="form-grid">
            <div class="field">
              <label>ชื่อหมวดหมู่ (ไทย) *</label>
              <input type="text" id="new-category-input" placeholder="เช่น ของหวาน">
            </div>
            <div class="field">
              <label>Category name (English) — optional</label>
              <input type="text" id="new-category-input-en" placeholder="e.g. Desserts">
            </div>
          </div>
          <button class="btn" id="btn-add-category">เพิ่มหมวดหมู่</button>
        </div>
      </div>

    </div>
  </div>

  <!-- ============ LOADING / TOAST ============ -->
  <div class="loading-overlay hidden" id="loading-overlay">
    <div class="spinner"></div>
    <div id="loading-text" style="color:var(--ink-soft); font-size:.85rem;">กำลังโหลดเมนู...</div>
  </div>
  <div class="toast" id="toast"></div>

</div>

<script src="app.js"></script>
</body>
</html>
